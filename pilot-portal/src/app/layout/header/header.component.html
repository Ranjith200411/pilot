<header
  class="flex items-center justify-between glass px-6 py-4 shadow-2xl border-b backdrop-blur-xl relative z-50 text-slate-800 dark:text-slate-100 bg-gradient-to-r from-slate-100/90 via-sky-100/80 to-slate-100/90 dark:from-slate-950/90 dark:via-slate-900/90 dark:to-slate-950/90 border-slate-200/70 dark:border-white/10"
>
  <!-- App Title -->
  <div class="flex items-center space-x-3 animate-slide-in">
    <div class="text-2xl font-bold tracking-wide gradient-text drop-shadow-lg">
      ✈️ Pilot Portal
    </div>
    <span
      class="hidden md:block text-xs text-slate-700 dark:text-blue-100 px-3 py-1 bg-gradient-to-r from-blue-200 to-cyan-200 dark:from-blue-600 dark:to-cyan-600 rounded-full shadow-lg animate-glow font-semibold"
      >Pro</span
    >
  </div>

  <!-- Right Section -->
  <div class="flex items-center space-x-4">
    <!-- Theme Toggle -->
    <button
      (click)="toggleTheme()"
      class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors"
      title="Toggle theme"
    >
      <svg
        *ngIf="!isDarkMode"
        class="w-5 h-5 text-yellow-400"
        fill="currentColor"
        viewBox="0 0 20 20"
      >
        <path
          fill-rule="evenodd"
          d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
          clip-rule="evenodd"
        />
      </svg>
      <svg
        *ngIf="isDarkMode"
        class="w-5 h-5 text-blue-400"
        fill="currentColor"
        viewBox="0 0 20 20"
      >
        <path
          d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
        />
      </svg>
    </button>

    <!-- Notifications -->
    <div class="relative z-[100]">
      <button
        (click)="toggleNotifications()"
        class="relative p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-all duration-300 transform hover:scale-110"
      >
        <svg
          class="w-5 h-5 text-slate-700 dark:text-slate-300"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"
          />
        </svg>
        <span
          *ngIf="unreadCount > 0"
          class="absolute top-0 right-0 w-5 h-5 bg-red-500 rounded-full text-white text-xs flex items-center justify-center font-bold animate-pulse"
          >{{ unreadCount }}</span
        >
      </button>

      <!-- Notification Dropdown -->
      <div
        *ngIf="notificationOpen"
        class="absolute right-0 mt-2 w-96 bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-600 z-[200] overflow-hidden animate-fly-in"
      >
        <!-- Header -->
        <div
          class="px-4 py-3 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between bg-gradient-to-r from-sky-100/80 to-cyan-100/80 dark:from-blue-900/50 dark:to-cyan-900/50"
        >
          <div>
            <h3 class="font-semibold text-slate-900 dark:text-white">
              Notifications
            </h3>
            <p class="text-xs text-slate-500 dark:text-slate-400">
              You have {{ unreadCount }} unread notifications
            </p>
          </div>
          <button
            (click)="markAllAsRead()"
            class="text-xs text-blue-400 hover:text-blue-300 transition-colors"
          >
            Mark all read
          </button>
        </div>

        <!-- Notifications List -->
        <div class="max-h-96 overflow-y-auto">
          <div
            *ngFor="let notification of displayedNotifications; trackBy: trackByNotifId"
            [ngClass]="{ 'bg-sky-50 dark:bg-slate-700/30': !notification.read }"
            class="px-4 py-3 border-b border-slate-200 dark:border-slate-700/50 hover:bg-slate-100 dark:hover:bg-slate-700/50 transition-colors cursor-pointer group"
            (click)="markAsRead(notification.id)"
          >
            <div class="flex items-start gap-3">
              <!-- Icon -->
              <div class="flex-shrink-0 mt-1">
                <div
                  class="w-10 h-10 rounded-lg flex items-center justify-center"
                  [ngClass]="{
                    'bg-yellow-500/20 text-yellow-400':
                      notification.type === 'warning',
                    'bg-green-500/20 text-green-400':
                      notification.type === 'success',
                    'bg-blue-500/20 text-blue-400':
                      notification.type === 'info',
                  }"
                >
                  <svg
                    *ngIf="notification.type === 'warning'"
                    class="w-5 h-5"
                    fill="currentColor"
                    viewBox="0 0 20 20"
                  >
                    <path
                      fill-rule="evenodd"
                      d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z"
                      clip-rule="evenodd"
                    />
                  </svg>
                  <svg
                    *ngIf="notification.type === 'success'"
                    class="w-5 h-5"
                    fill="currentColor"
                    viewBox="0 0 20 20"
                  >
                    <path
                      fill-rule="evenodd"
                      d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                      clip-rule="evenodd"
                    />
                  </svg>
                  <svg
                    *ngIf="notification.type === 'info'"
                    class="w-5 h-5"
                    fill="currentColor"
                    viewBox="0 0 20 20"
                  >
                    <path
                      fill-rule="evenodd"
                      d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                      clip-rule="evenodd"
                    />
                  </svg>
                </div>
              </div>

              <!-- Content -->
              <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-2">
                  <p class="text-sm font-medium text-slate-900 dark:text-white">
                    {{ notification.title }}
                  </p>
                  <button
                    (click)="
                      clearNotification(notification.id);
                      $event.stopPropagation()
                    "
                    class="text-slate-400 hover:text-slate-700 dark:hover:text-white opacity-0 group-hover:opacity-100 transition-opacity"
                  >
                    <svg
                      class="w-4 h-4"
                      fill="currentColor"
                      viewBox="0 0 20 20"
                    >
                      <path
                        fill-rule="evenodd"
                        d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
                        clip-rule="evenodd"
                      />
                    </svg>
                  </button>
                </div>
                <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">
                  {{ notification.message }}
                </p>
                <p class="text-xs text-slate-500 mt-1">
                  {{ notification.time }}
                </p>
                <div
                  *ngIf="!notification.read"
                  class="w-2 h-2 bg-blue-500 rounded-full absolute left-2 top-5"
                ></div>
              </div>
            </div>
          </div>

          <div
            *ngIf="notifications.length === 0"
            class="px-4 py-8 text-center text-slate-500 dark:text-slate-400"
          >
            <svg
              class="w-12 h-12 mx-auto mb-2 opacity-50"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"
              />
            </svg>
            <p class="text-sm">No notifications</p>
          </div>
        </div>

        <!-- Footer -->
        <div
          class="px-4 py-3 border-t border-slate-200 dark:border-slate-700 bg-slate-50/80 dark:bg-slate-800/50"
        >
          <button
            type="button"
            (click)="toggleAllNotifications()"
            class="w-full text-sm text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 transition-colors flex items-center justify-center gap-2"
          >
            {{
              showAllNotifications
                ? "Show fewer notifications"
                : "View all notifications"
            }}
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                [attr.d]="
                  showAllNotifications ? 'M15 19l-7-7 7-7' : 'M9 5l7 7-7 7'
                "
              />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- User Menu -->
    <div class="relative z-[100]">
      <button
        (click)="toggleMenu()"
        class="flex items-center space-x-2 focus:outline-none hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg px-3 py-2 transition-colors"
      >
        <div
          class="w-9 h-9 rounded-full bg-gradient-to-br from-blue-500 to-cyan-500 flex items-center justify-center font-semibold text-white shadow-lg"
        >
          {{ initials }}
        </div>
        <span
          class="hidden md:block text-sm font-medium text-slate-800 dark:text-slate-100"
          >{{ user?.name?.split(" ")[0] }}</span
        >
        <svg
          class="w-4 h-4 text-slate-500 dark:text-gray-300"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </button>

      <!-- Dropdown -->
      <div
        *ngIf="menuOpen"
        class="absolute right-0 mt-2 w-64 bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-600 z-[200] animate-fly-in"
      >
        <div class="px-4 py-3 border-b border-slate-200 dark:border-slate-700">
          <p class="font-medium text-slate-900 dark:text-white">
            {{ user?.name }}
          </p>
          <p class="text-sm text-slate-500 dark:text-slate-400">
            {{ user?.email }}
          </p>
        </div>

        <a
          routerLink="/profile"
          (click)="closeMenu()"
          class="flex items-center space-x-3 px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
        >
          <svg
            class="w-5 h-5 text-slate-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
          <span class="text-slate-700 dark:text-slate-200">View Profile</span>
        </a>

        <a
          routerLink="/dashboard"
          (click)="closeMenu()"
          class="flex items-center space-x-3 px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
        >
          <svg
            class="w-5 h-5 text-slate-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
            />
          </svg>
          <span class="text-slate-700 dark:text-slate-200">Dashboard</span>
        </a>

        <button
          (click)="logout()"
          class="w-full flex items-center space-x-3 px-4 py-3 hover:bg-red-600 hover:text-white transition-colors rounded-b-xl"
        >
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>
</header>
